name: CI

# Verification on every PR and push to main, plus publishing the landing page.
# Releases (versioning, tagging, signed APK) live in release.yml.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper
        # فعال‌سازی کش برای کارهای موازی و خروجی‌های کامپایل شده
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --continue

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    # The landing page links to releases/latest/download/chistanland-latest.apk,
    # so Pages only needs the HTML + screenshots — the APK comes from the release.
    - name: Prepare Landing Page
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p public
        if [ -f scripts/landing-page.html ]; then
          cp scripts/landing-page.html public/index.html
          cp scripts/*.png public/ 2>/dev/null || true
        else
          echo "<html><body><h1>ChistanLand</h1><a href='https://github.com/OpScaleHub/chistanLand/releases/latest/download/chistanland-latest.apk'>Download latest APK</a></body></html>" > public/index.html
        fi

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
